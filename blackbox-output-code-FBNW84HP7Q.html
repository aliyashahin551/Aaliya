<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊 Subah Surf</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8E8 70%, #4682B4 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: linear-gradient(180deg, #87CEEB 0%, transparent 100%);
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                #87CEEB 0%, 
                #87CEEB 60%, 
                #4682B4 80%, 
                #1E3A8A 100%);
            image-rendering: pixelated;
            cursor: none;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }

        #score {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
        }

        #controls {
            display: flex;
            gap: 10px;
            font-size: 18px;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            backdrop-filter: blur(20px);
        }

        #restartBtn {
            background: #FF6B35;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        #restartBtn:hover {
            background: #E55A2B;
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            #ui {
                font-size: 18px;
                flex-direction: column;
                gap: 10px;
            }
            #controls {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div id="score">Score: <span id="scoreValue">0</span></div>
            <div id="controls">
                🏄‍♂️ Use ← → arrows or A/D / Touch sides
            </div>
        </div>

        <div id="gameOver">
            <h2>🌊 Wipeout! 🌊</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button id="restartBtn">🏄‍♂️ Surf Again!</button>
        </div>
    </div>

    <script>
        class SurfGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.resizeCanvas();
                
                // Game state
                this.score = 0;
                this.gameRunning = true;
                this.gameSpeed = 3;
                
                // Player
                this.player = {
                    x: 100,
                    y: 300,
                    width: 40,
                    height: 60,
                    speed: 8,
                    color: '#FF6B35'
                };
                
                // Game objects arrays
                this.obstacles = [];
                this.coins = [];
                this.powerups = [];
                
                // Input handling
                this.keys = {};
                this.touchStartX = 0;
                
                this.init();
            }
            
            resizeCanvas() {
                const rect = this.canvas.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                this.gameHeight = this.canvas.height;
                this.gameWidth = this.canvas.width;
            }
            
            init() {
                this.setupEventListeners();
                this.gameLoop();
            }
            
            setupEventListeners() {
                // Keyboard
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key.toLowerCase()] = true;
                });
                
                document.addEventListener('keyup', (e) => {
                    this.keys[e.key.toLowerCase()] = false;
                });
                
                // Touch/Mouse
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.touchStartX = e.touches[0].clientX;
                });
                
                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touchX = e.touches[0].clientX;
                    const centerX = this.gameWidth / 2;
                    if (touchX < centerX - 50) {
                        this.player.x = Math.max(0, this.player.x - this.player.speed);
                    } else if (touchX > centerX + 50) {
                        this.player.x = Math.min(this.gameWidth - this.player.width, this.player.x + this.player.speed);
                    }
                });
                
                this.canvas.addEventListener('mousemove', (e) => {
                    if (!this.gameRunning) return;
                    const rect = this.canvas.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const centerX = this.gameWidth / 2;
                    if (mouseX < centerX - 50) {
                        this.player.x = Math.max(0, this.player.x - this.player.speed * 0.5);
                    } else if (mouseX > centerX + 50) {
                        this.player.x = Math.min(this.gameWidth - this.player.width, this.player.x + this.player.speed * 0.5);
                    }
                });
                
                // Resize
                window.addEventListener('resize', () => this.resizeCanvas());
                
                // Restart
                document.getElementById('restartBtn').addEventListener('click', () => this.restart());
            }
            
            update() {
                if (!this.gameRunning) return;
                
                // Player movement
                if (this.keys['a'] || this.keys['arrowleft']) {
                    this.player.x = Math.max(0, this.player.x - this.player.speed);
                }
                if (this.keys['d'] || this.keys['arrowright']) {
                    this.player.x = Math.min(this.gameWidth - this.player.width, this.player.x + this.player.speed);
                }
                
                // Spawn obstacles
                if (Math.random() < 0.02 + this.score * 0.0001) {
                    this.obstacles.push({
                        x: this.gameWidth,
                        y: this.gameHeight - 80 - Math.random() * 100,
                        width: 30 + Math.random() * 20,
                        height: 60 + Math.random() * 40,
                        color: '#8B4513'
                    });
                }
                
                // Spawn coins
                if (Math.random() < 0.015) {
                    this.coins.push({
                        x: this.gameWidth,
                        y: 100 + Math.random() * (this.gameHeight - 200),
                        width: 20,
                        height: 20,
                        color: '#FFD700',
                        spin: 0
                    });
                }
                
                // Spawn powerups (speed boost)
                if (Math.random() < 0.005) {
                    this.powerups.push({
                        x: this.gameWidth,
                        y: 150 + Math.random() * (this.gameHeight - 250),
                        width: 25,
                        height: 25,
                        color: '#00FF00',
                        pulse: 0,
                        active: false
                    });
                }
                
                // Update obstacles
                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const obs = this.obstacles[i];
                    obs.x -= this.gameSpeed;
                    if (obs.x + obs.width < 0) {
                        this.obstacles.splice(i, 1);
                        this.score += 10;
                    }
                }
                
                // Update coins
                for (let i = this.coins.length - 1; i >= 0; i--) {
                    const coin = this.coins[i];
                    coin.x -= this.gameSpeed;
                    coin.spin += 0.2;
                    if (coin.x + coin.width < 0) {
                        this.coins.splice(i, 1);
                    }
                }
                
                // Update powerups
                for (let i = this.powerups.length - 1; i >= 0; i--) {
                    const powerup = this.powerups[i];
                    powerup.x -= this.gameSpeed;
                    powerup.pulse += 0.15;
                    if (powerup.x + powerup.width < 0) {
                        this.powerups.splice(i, 1);
                    }
                }
                
                // Collision detection
                this.checkCollisions();
                
                // Update score display
                document.getElementById('scoreValue').textContent = this.score;
                
                // Increase difficulty
                this.gameSpeed += 0.001;
            }
            
            checkCollisions() {
                const playerRect = this.player;
                
                // Obstacles
                for (let obs of this.obstacles) {
                    if (this.rectCollision(playerRect, obs)) {
                        this.gameOver();
                        return;
                    }
                }
                
                // Coins
                for (let i = this.coins.length - 1; i >= 0; i--) {
                    if (this.rectCollision(playerRect, this.coins[i])) {
                        this.coins.splice(i, 1);
                        this.score += 50;
                    }
                }
                
                // Powerups
                for (let i = this.powerups.length - 1; i >= 0; i--) {
                    if (this.rectCollision(playerRect, this.powerups[i])) {
                        this.powerups.splice(i, 1);
                        this.player.speed *= 1.5; // Speed boost
                        setTimeout(() => {
                            this.player.speed /= 1.5;
                        }, 5000);
                        this.score += 100;
                    }
                }
            }
            
            rectCollision(r1, r2) {
                return r1.x < r2.x + r2.width &&
                       r1.x + r1.width > r2.x &&
                       r1.y < r2.y + r2.height &&
                       r1.y + r1.height > r2.y;
            }
            
            render() {
                // Clear canvas
                this.ctx.fillStyle = 'rgba(135, 206, 235, 0.1)';
                this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight);
                
                // Draw waves
                this.drawWaves();
                
                // Draw player (surfer)
                this.drawPlayer();
                
                // Draw obstacles (rocks)
                for (let obs of this.obstacles) {
                    this.drawObstacle(obs);
                }
                
                // Draw coins
                for (let coin of this.coins) {
                    this.drawCoin(coin);
                }
                
                // Draw powerups
                for (let powerup of this.powerups) {
                    this.drawPowerup(powerup);
                }
            }
            
            drawWaves() {
                this.ctx.save();
                this.ctx.translate(0, this.gameHeight);
                
                // Multiple wave layers
                for (let i = 0; i < 3; i++) {
                    const waveOffset = (this.score * 0.1 + Date.now() * 0.001) * (0.5 - i * 0.2);
                    this.ctx.strokeStyle = `rgba(52, 152, 219, ${0.3 + i * 0.2})`;
                    this.ctx.lineWidth = 8 + i * 4;
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, 0);
                    
                    for (let x = 0; x < this.gameWidth; x += 10) {
                        const y = Math.sin((x * 0.01 + waveOffset) * Math.PI) * 30 + i * 20;
                        this.ctx.lineTo(x, y);
                    }
                    this.ctx.lineTo(this.gameWidth, 0);
                    this.ctx.stroke();
                }
                
                this.ctx.restore();
            }
            
            drawPlayer() {
                const x = this.player.x;
                const y = this.player.y;
                
                // Surfboard
                this.ctx.fillStyle = '#8B4513';
                this.ctx.fillRect(x + 5, y + 30, this.player.width - 10, 25);
                
                // Surfer body
                this.ctx.fillStyle = this.player.color;
                this.ctx.fillRect(x + 12, y + 10, 16, 25);
                
                // Head
                this.ctx.fillStyle = '#FDBCB4';
                this.ctx.beginPath();
                this.ctx.arc(x + 20, y + 5, 8, 0, Math.PI * 2);
                this.ctx.fill();
                
                // Arms
                this.ctx.strokeStyle = this.player.color;
                this.ctx.lineWidth = 4;
                this.ctx.beginPath();
                this.ctx.moveTo(x + 12, y + 18);
                this.ctx.lineTo(x + 5, y + 25);
                this.ctx.moveTo(x + 28, y + 18);
                this.ctx.lineTo(x + 35, y + 25);
                this.ctx.stroke();
            }
            
            drawObstacle(obs) {
                this.ctx.fillStyle = obs.color;
                this.ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                
                // Rock details
                this.ctx.fillStyle = '#654321';
                this.ctx.fillRect(obs.x + 5, obs.y + 5, obs.width - 10, obs.height - 10);
            }
            
            drawCoin(coin) {
                this.ctx.save();
                this.ctx.translate(coin.x + coin.width/2, coin.y + coin.height/2);
                this.ctx.rotate(coin.spin);
                
                // Coin shine
                const gradient = this.ctx.createRadialGradient(-5, -5, 0, 0, 0, 12);
                gradient.addColorStop(0, 'rgba(255,255,255,0.8)');
                gradient.addColorStop(0.7, coin.color);
                gradient.addColorStop(1, 'rgba(255,215,0,0.6)');
                
                this.ctx.fillStyle = gradient;
                this.ctx.beginPath();
                this.ctx.arc(0, 0, 10, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.restore();
            }
            
            drawPowerup(powerup) {
                this.ctx.save();
                this.ctx.translate(powerup.x + powerup.width/2, powerup.y + powerup.height/2);
                this.ctx.scale(1 + Math.sin(powerup.pulse) * 0.2, 1 + Math.sin(powerup.pulse) * 0.2);
                
                // Powerup glow
                const gradient = this.ctx.createRadialGradient(0, 0, 0, 0, 0, 15);
                gradient.addColorStop(0, '#00FF88');
                gradient.addColorStop(0.7, powerup.color);
                gradient.addColorStop(1, 'rgba(0,255,0,0.3)');
                
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(-12.5, -12.5, 25, 25);
                
                // Lightning bolt
                this.ctx.fillStyle = 'white';
                this.ctx.fillRect(-2, -8, 4, 16);
                this.ctx.fillRect(0, -6, 8, 4);
                this.ctx.fillRect(4, -2, 4, 8);
                
                this.ctx.restore();
            }
            
            gameOver() {
                this.gameRunning = false;
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOver').style.display = 'block';
            }
            
            restart() {
                this.gameRunning = true;
                this.score = 0;
                this.gameSpeed = 3;
                this.player.x = 100;
                this.player.y = 300;
                this.player.speed = 8;
                this.obstacles = [];
                this.coins = [];
                this.powerups = [];
                document.getElementById('gameOver').style.display = 'none';
            }
            
            gameLoop() {
                this.update();
                this.render();
                requestAnimationFrame(() => this.gameLoop());
            }
        }
        
        // Start game when page loads
        window.addEventListener('load', () => {
            new SurfGame();
        });
    </script>
</body>
</html>
